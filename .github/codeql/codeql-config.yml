name: TariffShield CodeQL configuration

queries:
  - uses: security-and-quality

paths:
  - apps/api/src
  - apps/web
  - packages/sdk/src
  - scripts

paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "**/coverage/**"
  - "**/generated/**"
  - "**/*.generated.ts"
  - "**/*.generated.tsx"
