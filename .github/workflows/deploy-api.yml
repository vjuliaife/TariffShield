name: Deploy API

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    branches:
      - main
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        
      - name: Poll Health Endpoint
        run: |
          echo "Waiting for deployment to propagate..."
          # In a real scenario, this should poll until it returns the current SHA or version.
          sleep 30
          curl -f https://api.tariffshield.com/health || exit 1

      - name: Report Deployment Status
        run: echo "Deployed commit ${{ github.sha }}"
