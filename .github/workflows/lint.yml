name: Lint

on:
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: lint / ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sdk
            workspace: packages/sdk
          - package: api
            workspace: apps/api
          - package: web
            workspace: apps/web

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint ${{ matrix.package }}
        run: npm run lint --workspace=${{ matrix.workspace }} --if-present

      - name: Check formatting ${{ matrix.package }}
        run: npm run format:check --workspace=${{ matrix.workspace }} --if-present
